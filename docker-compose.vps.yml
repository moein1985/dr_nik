services:
  app:
    image: dr_nik_clinic-app:latest
    container_name: dr_nik_clinic_app
    restart: unless-stopped
    command: sh -c "npm run prisma:migrate:deploy && npm run start"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dr_nik_clinic
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      STAFF_NOTIFICATION_EMAIL: staff@drnikclinic.local
      DEFAULT_SUPER_ADMIN_USERNAME: superadmin
      DEFAULT_SUPER_ADMIN_PASSWORD: "SuperAdmin123!"
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: "Admin123!"
      DEFAULT_STAFF_USERNAME: staff
      DEFAULT_STAFF_PASSWORD: "Staff123!"
      DEFAULT_STAFF_EMAIL: staff@drnikclinic.local
      NODE_ENV: production
      ENABLE_SMOKE_ROUTES: "false"
    ports:
      - "80:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', (res) => { process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - postgres
      - mailpit

  postgres:
    image: postgres:16-alpine
    container_name: dr_nik_clinic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dr_nik_clinic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.20
    container_name: dr_nik_clinic_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
